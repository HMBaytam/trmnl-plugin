name: trmnl-plugin
services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      repo: HMBaytam/trmnl-plugin
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb   # smallest paid tier (~$5/mo)
    health_check:
      http_path: /health
    envs:
      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET           # encrypted; set the actual value in the dashboard/CLI
      - key: MONGODB
        scope: RUN_TIME
        value: barakah
